# Old tape: worn playback, not collage. Grains stay in order (no rearrange), so
# the source plays through. Saturation + dull highs come from fx; the tape
# character (hiss, dropouts, wow/flutter) is a finishing pass in tape.
seed: 42
source: {channels: keep}            # most old tape is effectively mono
chain: [grain, rearrange, fx, splice]         # no rearrange -> timeline preserved
grain: {mode: onset}   # gentle grains, slight timing drift
fx:    {drive: 0.3, tone: 0.65, chorus: 0.5, reverb: 0.8}  # saturation, dull highs, faint age/space
splice: {join: crossfade, fade: 0.15, dropouts: 0.2}   # dropouts printed into the render (repeat each loop)
# Finishing tape pass on the rendered output: hiss, wow/flutter, varispeed, wear.
tape: {seam: crossfade, region: [11,15], cycles: 16, hiss: 0.10, flutter: 0.6, speed: 0.66, wear: 0.7, feedback: true}
ott: {depth: 0.5, where: output}
rearrange:
  feel: sort              # as-is | shuffle | reverse | sort   (as-is = transparent)
  scramble: 0.0            # shuffle: how far segments stray from order
  drop: 0.0                # fraction of segments discarded (0 = keep all)
  sort_by: loudness      # sort: brightness | loudness | duration